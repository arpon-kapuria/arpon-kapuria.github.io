<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Iceland&family=Major+Mono+Display&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&family=Permanent+Marker&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
    <link rel="manifest" href="../images/site.webmanifest">

    <title id="meta-title"></title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="" id="meta-title-tag"/>
    <meta name="description" content="" id="meta-description-tag"/>

    <!-- Open Graph -->
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="" id="meta-og-title"/>
    <meta property="og:description" content="" id="meta-og-description"/>

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="" id="meta-twitter-title"/>
    <meta name="twitter:description" content="" id="meta-twitter-description"/>

</head>

<body>
    <main class="main">
        <div class="content-container">
            <article class="blog-post">

                <!-- HERO -->
                <header class="blog-hero">
                    <div class="blog-metadata">
                        <div class="blog-meta-left">
                            <span><a href="../blogs.html">&larr; Writings</a></span>
                            <span>|</span>
                            <span><a href="../index.html">Arpon Kapuria</a></span>
                        </div>

                        <div class="blog-meta-right">
                            <span id="blog-date"></span>
                            <span>•</span>
                            <span id="reading-time"></span>
                            <span>•</span>
                            <span id="blog-category"></span>
                            <span>|</span>
                            <span class="theme-toggle"><i class="fas fa-lightbulb"></i></span>
                        </div>
                    </div>

                    <h1 class="title" id="blog-title"></h1>
                    
                    <br>
                    <p class="blog-metadata-modification-time" id="blog-modified"></p>
                </header>

                <!-- MAIN CONTENT (MARKDOWN) -->
                <section class="blog-content-md" id="blog-content-md">Loading article...</section>
            </article>
        </div>
    </main>

    <div id="footer"></div>

    <script src="../js/main.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="../js/markdown-loader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
</body>
</html>
